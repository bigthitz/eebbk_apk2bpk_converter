name: Build apk2bpk Tool
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Windows x64 EXE (MSYS2)
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: apk2bpk.exe

  # Linux x86_64 PC
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install make gcc -y

      - name: Compile
        run: make CC=gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: apk2bpk

  # ARM64 Linux (Termux/手机)
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install make gcc -y

      - name: Compile ARM64 binary
        run: make CC=gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-termux
          path: apk2bpk

  # 打版本标签自动打包Release压缩包
  release-package:
    needs: [build-windows, build-linux-x64, build-linux-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4

      - name: Organize files
        run: |
          mkdir dist
          mv windows-x64/apk2bpk.exe dist/
          mv linux-x64/apk2bpk dist/apk2bpk-x64
          mv linux-arm64-termux/apk2bpk dist/apk2bpk-arm64-termux
          zip apk2bpk-all.zip dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: apk2bpk-all.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
